; MARAS Package Override Configuration
; ============================================================
; Controls how MARAS interacts with other AI packages that start
; on managed (spouse) actors.
;
; [PackageOverrides]
;
;   Whitelist = comma-separated editor ID patterns
;     Packages whose editor IDs match these patterns are ALWAYS allowed to run.
;
;   AllowedPlugins = comma-separated plugin name patterns
;     Packages whose *originating* plugin (the file that created the form,
;     not patches that edit it) matches these patterns are ALWAYS allowed to run.
;     Use this to permit all packages from a specific mod without listing
;     individual editor IDs.
;
;   QuestPriority = integer threshold (omit or set to -1 to disable)
;     For packages driven by a quest alias, compares the owning quest's priority
;     value against this threshold:
;       quest priority >= QuestPriority  →  allow candidate package
;       quest priority <  QuestPriority  →  redirect to MARAS sandbox
;                                           (unless matched by QuestWhitelist)
;     Packages with no quest association are unaffected by this setting.
;     Typical Skyrim quest priorities range from 0 (lowest) to 100+ (highest).
;
;   QuestWhitelist = comma-separated quest editor ID patterns
;     When QuestPriority is active and a candidate package would otherwise be
;     suppressed (its quest priority is below the threshold), these patterns are
;     checked against the owning quest's editor ID.  A match exempts the package
;     from suppression and allows it to run freely.
;     Has no effect when QuestPriority is not set.
;
; Evaluation order (first match wins):
;   1. Whitelist        — allow by editor ID pattern
;   2. AllowedPlugins   — allow by originating plugin name pattern
;   3. QuestPriority    — allow or suppress based on quest priority threshold
;   4. Default          — redirect to MARAS sandbox
;
; Wildcard rules (case-insensitive) apply to Whitelist and AllowedPlugins:
;   SkyrimNet*       matches any name starting with "SkyrimNet"
;   *TalkToPlayer    matches any name ending with "TalkToPlayer"
;   *Chat*           matches any name containing "Chat"
;   ExactName        exact match
;

[PackageOverrides]
Whitelist=SkyrimNet*
AllowedPlugins=nwsFollowerFramework.esp
; QuestPriority=61
; QuestWhitelist=
